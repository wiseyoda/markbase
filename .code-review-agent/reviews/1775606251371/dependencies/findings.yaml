findings:
  - category: "dependencies"
    severity: "low"
    title: "Move @tailwindcss/typography out of production dependencies"
    description: >
      package.json declares @tailwindcss/typography at line 12 under
      dependencies, but the package is only consumed by the Tailwind build
      pipeline via `@plugin "@tailwindcss/typography";` in
      src/app/globals.css. No runtime code imports it, so production installs
      currently ship a build-only plugin.
    why: >
      Keeping a Tailwind plugin in production dependencies increases the
      runtime dependency surface and deployment footprint for no user-facing
      benefit. That makes future audits and supply-chain response slightly
      harder because a production install includes a package that is never
      needed at runtime.
    file: "package.json"
    line: 12
    confidence: 98
    effort: 1
    impact: 2
    risk: 1
    suggestedFix: >
      Move the package to devDependencies at the same version and reinstall the
      lockfile, for example:
      pnpm remove @tailwindcss/typography
      pnpm add -D @tailwindcss/typography@0.5.0-alpha.3
      Keep the existing `@plugin "@tailwindcss/typography";` directive in
      src/app/globals.css unchanged.
    codeSnippet: >
      "dependencies": {
        "@tailwindcss/typography": "0.5.0-alpha.3",
        "diff": "^8.0.4",
        "gray-matter": "^4.0.3",
